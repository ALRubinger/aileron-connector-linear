# gen.yaml — per-operation governance overlay consumed by
# `aileron-codegen`. The codegen emits `actions/<name>/action.md` files
# from this overlay + `schema.graphql`. Re-run via `task generate`.
#
# Shape (provisional until the codegen umbrella's "stable overlay
# schema" criterion is met — see ALRubinger/aileron#893):
#
#   connector:
#     name, publisher, credential.{kind, header, format}, network.hosts
#   suite:
#     name, description
#   operations:
#     <operationId>:
#       idempotent: bool                  # optional override; default per method kind
#       approval: required | none         # optional override; default per method kind
#       capabilities: [string]            # optional; default [snake_case(operationId)]
#       intent?: string                   # default: GraphQL field description
#       action_name?: string              # default: kebab-case(operationId)
#       execute_id?: string               # default: first lower-cased word
#   exclude: [operationId, ...]           # drop specific ops from emission

connector:
  name: "github://ALRubinger/aileron-connector-linear"
  publisher: "ALRubinger"
  credential:
    # Linear personal API keys go in as `Authorization: <key>` with no
    # `Bearer ` prefix (their published convention; verified empirically
    # against api.linear.app/graphql). `format = "{key}"` overrides the
    # runtime's default `Bearer {key}` per ALRubinger/aileron#917 / #919.
    kind: "api_key"
    header: "Authorization"
    format: "{key}"
  endpoint: "https://api.linear.app/graphql"
  network:
    hosts:
      - "api.linear.app:443"

suite:
  name: "linear"
  description: "Full Linear GraphQL surface — every root-level Query and Mutation field on api.linear.app/graphql is exposed as an action. Reads default to idempotent with no approval; writes default to non-idempotent and per-call user approval per ADR-0009. The four originally hand-picked operations (issue, viewer, issueCreate, commentCreate) keep their tuned action names and capabilities via the overrides below; everything else inherits codegen defaults."

operations:
  issue:
    idempotent: true
    approval: none
    capabilities: ["get_issue"]
    action_name: "get-issue"
    execute_id: "get"
    intent: "fetch a Linear issue by id"

  viewer:
    idempotent: true
    approval: none
    capabilities: ["get_viewer"]
    intent: "look up the Linear user currently authenticated to the connector"

  issueCreate:
    idempotent: false
    approval: required
    capabilities: ["create_issue"]

  commentCreate:
    idempotent: false
    approval: required
    capabilities: ["create_comment"]
