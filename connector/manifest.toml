# Aileron connector manifest for github://ALRubinger/aileron-connector-linear.
#
# Per ADR-0002 the manifest declares the connector's identity, what it can
# talk to (network), and what credentials it needs to do so. The runtime
# enforces these at the WASM sandbox boundary and at the action boundary
# (defense in depth per ADR-0003 / ADR-0005).

# `version` is `0.0.0-dev` in source as a placeholder. CI substitutes the
# real version (extracted from the pushed tag) into a build copy before
# hashing/signing/packing — the same release-template pattern as the
# action manifests' `sha256:bound-at-release` hash.
[connector]
name = "github://ALRubinger/aileron-connector-linear"
version = "0.0.0-dev"
publisher = "ALRubinger"

# Network capability — the only host:port pairs this connector is allowed
# to dial. Anything else is denied at the sandbox boundary with class
# capability_denied (ADR-0005 acceptance #3).
[capabilities.network]
hosts = [
  "api.linear.app:443",
]

# Credential capability — the runtime resolves and injects the credential
# on the connector's behalf. Per ADR-0005 the connector never holds the
# credential bytes; the runtime sets the `Authorization` header host-side
# when an outbound request marks itself as `credential: "api_key"`.
#
# Linear personal API keys are issued at https://linear.app/settings/api
# and used as `Authorization: <api_key>` (note: no `Bearer` prefix; this
# is Linear's published convention). The user binds the key once via
# `aileron binding setup`; the runtime stores it and replays it on every
# Linear-bound request from this connector.
[capabilities.credential]
kind = "api_key"
header = "Authorization"
