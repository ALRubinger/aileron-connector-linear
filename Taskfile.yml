version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
    silent: true

  build:
    desc: Build the connector WASM binary
    dir: connector
    sources:
      - main.go
      - go.mod
    generates:
      - ../connector.wasm
    env:
      GOOS: wasip1
      GOARCH: wasm
    cmds:
      - go build -trimpath -ldflags="-s -w" -o ../connector.wasm .

  pack:
    desc: Build and pack the connector tarball locally (mirrors the CI release workflow's first half — useful for offline smoke testing)
    deps: [build]
    cmds:
      - rm -f connector-payload.bin connector-payload.sig
      - cat connector.wasm connector/manifest.toml > connector-payload.bin
      - |
        if [ -z "$AILERON_SIGNING_KEY" ]; then
          echo "AILERON_SIGNING_KEY env var not set; skipping signature (local dev)"
          tar czf aileron.tar.gz connector.wasm connector/manifest.toml
          exit 0
        fi
        printf '%s' "$AILERON_SIGNING_KEY" | base64 -d > /tmp/aileron-signing.key
        openssl pkeyutl -sign -rawin -inkey /tmp/aileron-signing.key -in connector-payload.bin -out connector-payload.sig
        rm -f /tmp/aileron-signing.key
        tar czf aileron.tar.gz connector.wasm connector/manifest.toml connector-payload.sig

  pack:hash:
    desc: Print what the CI release workflow's connector content hash would be for the current build
    deps: [build]
    cmds:
      - |
        cat connector.wasm connector/manifest.toml > /tmp/aileron-pack-hash.bin
        echo -n "sha256:"
        shasum -a 256 /tmp/aileron-pack-hash.bin | awk '{print $1}'
        rm -f /tmp/aileron-pack-hash.bin

  generate:
    desc: Re-run aileron-codegen against the bundled schema + overlay; rewrites actions/
    cmds:
      # Pinned to a specific commit SHA while aileron-codegen is
      # pre-release — `@latest` resolves through the module proxy's
      # cache and lags behind the actual repo HEAD for hours, which
      # makes `generate:check` fail on freshly-pushed codegen changes.
      # Switch to a semver tag once the overlay schema stabilizes per
      # ALRubinger/aileron#893 (umbrella).
      - go run github.com/ALRubinger/aileron-codegen/cmd/aileron-codegen@19ab9dbae1587bf68f92550d225326a6196a4f57 --spec codegen/schema.graphql --overlay codegen/gen.yaml --out .

  generate:check:
    desc: Verify the committed actions/ matches what codegen would emit. CI guard.
    cmds:
      - task: generate
      - git diff --exit-code -- actions

  test:
    desc: Run connector unit tests + verify the wasip1 target still compiles
    cmds:
      - task: test:unit
      - task: test:wasip1

  test:unit:
    desc: Run unit tests for the pure helpers (host platform; no WASM)
    dir: connector
    cmds:
      - go test -v -count=1 -coverprofile=coverage.out ./...

  test:wasip1:
    desc: Smoke-check the connector compiles for the wasip1 target
    dir: connector
    env:
      GOOS: wasip1
      GOARCH: wasm
    cmds:
      - go build -o /dev/null .

  vet:
    desc: go vet (host platform; main.go is wasip1-tagged so it is exercised by test:wasip1)
    dir: connector
    cmds:
      - go vet ./...

  ci:
    desc: Full local CI gate — generate:check + test + vet
    cmds:
      - task: generate:check
      - task: test
      - task: vet

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f connector.wasm connector-payload.bin connector-payload.sig aileron.tar.gz connector/coverage.out
